risks:
  numerical_stability_risks:
  - mitigation: 'AdamW with gradient clipping at 1.0, mixed-precision loss scaling,
      early stop on NaN, skip invalid batches, log gradient norms and mask-logit ranges.

      '
    risk: NaN/divergence during PEFT or student distillation.
  - mitigation: 'Temperature scaling, logit clipping, and gradual lambda_kd/lambda_traj
      warmup over first 10% epochs.

      '
    risk: KL/logit distillation instability from overconfident teacher logits.
  - mitigation: 'Start from PTQ; invoke short QAT recovery only if INT8AccuracyDrop
      exceeds threshold; use representative calibration set.

      '
    risk: Quantization-aware training instability or severe fake-quant mismatch.
  - mitigation: 'Prefer sam2.1_hiera_base_plus.pt for full experiment grid, reserve
      large model for one confirmatory subset only, use gradient accumulation and
      activation checkpointing.

      '
    risk: OOM from SAM2 large checkpoint.
  - mitigation: 'Curriculum pseudo-labeling, confidence thresholding, capped pseudo-supervision
      ratio, and early stopping on validation deterioration.

      '
    risk: Policy-collapse/reward-explosion style issue not applicable, but training
      collapse from noisy pseudo labels is possible.
  reproducibility_risks:
  - mitigation: Split by source/sequence/device prefix rather than random image split.
    risk: Data leakage via near-duplicate frames across train/test.
  - mitigation: Warmup 50 runs, then average over 200 timed runs on fixed hardware
      and fixed input size.
    risk: Inconsistent latency measurement.
  - mitigation: Use 10 seeds/condition, paired nonparametric tests, and report raw
      seed values.
    risk: Insufficient power.
  scientific_risks:
  - mitigation: 'Manually audit a protocol_consistent_subset, tag annotation protocol
      where possible, and report H4 analyses explicitly.

      '
    risk: Local labels may mix thermal-response masks and physical-object contours,
      confounding conclusions.
  - mitigation: 'Treat H3 as falsifiable; compare against direct lightweight baselines
      and be willing to reject the full chain.

      '
    risk: SAM2 may fail to transfer to IR even after PEFT, limiting downstream distillation
      value.
  - mitigation: 'Use audited pseudo-label precision, prompt-agreement filtering, and
      per-regime reporting.

      '
    risk: Pseudo labels may amplify teacher bias on fuzzy boundaries and tiny objects.
topic: '[cv] 建立一种使用相对较少的boundingbox标注的红外数据集，将SAM2迁移到红外领域并完成蒸馏量化，使其满足端侧可部署；这种管线做成端到端的微调框架，是否有发表价值？'
