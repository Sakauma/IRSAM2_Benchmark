# 旧版 paper_experiments_v1.yaml 入口使用的机器本地路径模板。
# 新的服务器完整运行优先使用 server_benchmark_full.example.yaml。
# 如果仍需运行 scripts/run_paper_experiments.py，请复制本文件为 local_paths.yaml 并填写真实路径。
sam2:
  # SAM2 官方仓库根目录。
  repo: "/path/to/sam2"
  # SAM2 checkpoint 所在目录。
  checkpoint_root: "/path/to/sam2/checkpoints"

artifacts:
  # 旧 paper runner 的输出根目录。
  root: "artifacts"

datasets:
  # key 必须和 paper_experiments_v1.yaml 中 datasets 的 key 一致。
  nuaa_sirst: "/path/to/NUAA-SIRST"
  nudt_sirst: "/path/to/NUDT-SIRST"
  irstd_1k: "/path/to/IRSTD-1K"
  multimodal: "/path/to/MultiModal"
  rbgt_tiny_ir_box: "/path/to/RBGT-Tiny"

execution:
  # 旧 runner 启动子进程时设置的 GPU 可见设备。
  cuda_visible_devices: "0"
  # 降低 CUDA 内存碎片风险。
  pytorch_cuda_alloc_conf: "expandable_segments:True"

# 可选的机器级 runtime 覆盖。
# zero-shot SAM2 不训练模型，所以默认只需要一个确定性 seed。
runtime:
  seeds: [42]
  # 如果显存不足，可以在这里临时覆盖批大小。
  # 删除这些键后会使用具体 runner 或 checkpoint 的默认值。
  # image_batch_size: 8
  # auto_mask_points_per_batch: 128
  # batch_oom_fallback: true
