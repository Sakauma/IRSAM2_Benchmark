sam2:
  repo: "/path/to/sam2"
  checkpoint_root: "/path/to/sam2/checkpoints"

artifacts:
  root: "artifacts"

datasets:
  nuaa_sirst: "/path/to/NUAA-SIRST"
  nudt_sirst: "/path/to/NUDT-SIRST"
  irstd_1k: "/path/to/IRSTD-1K"
  multimodal: "/path/to/MultiModal"
  rbgt_tiny_ir_box: "/path/to/RBGT-Tiny"

execution:
  cuda_visible_devices: "0"
  pytorch_cuda_alloc_conf: "expandable_segments:True"

# Optional machine-level runtime override.
# The 5090 full benchmark defaults to one deterministic seed because zero-shot
# SAM2 inference does not need repeated training seeds.
runtime:
  seeds: [42]
  # Optional overrides for batched inference. Remove these keys to use the
  # checkpoint-specific defaults now live in configs/server_benchmark_full.example.yaml.
  # image_batch_size: 8
  # auto_mask_points_per_batch: 128
  # batch_oom_fallback: true
