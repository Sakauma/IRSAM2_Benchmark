model_defaults:
  model_id: "sam2.1_hiera_base_plus"
  family: "sam2"
  cfg: "configs/sam2.1/sam2.1_hiera_b+.yaml"
  ckpt: "checkpoints/sam2.1_hiera_base_plus.pt"
  repo: ""

runtime_defaults:
  artifact_root: "artifacts"
  reference_results_root: "reference_results"
  output_name: "paper_v1/default"
  device: "cuda"
  num_workers: 0
  smoke_test: false
  max_samples: 0
  max_images: 0
  save_visuals: true
  visual_limit: 24
  update_reference_results: false
  seeds: [42, 123, 456]

evaluation_defaults:
  benchmark_version: "irsam2-paper-v1-ir-only"
  track: "track_a_image_prompted"
  protocol: "ir_only_mask_segmentation"
  inference_mode: "box"
  split_version: "paper_split_v1"
  prompt_policy_version: "paper_prompt_policy_v1"
  metric_schema_version: "paper_metric_schema_v1"
  reference_result_version: "paper_reference_results_v1"
  temporal_eval_policy: "image_only"
  prompt_policy:
    name: "paper_default_ir_prompt"
    prompt_type: "box"
    prompt_source: "gt"
    prompt_budget: 1
    refresh_interval: null
    multi_mask: false
    notes: "IR-only paper benchmark prompt policy."

stage_defaults:
  transfer: {}
  adapt: {}
  distill: {}
  quantize: {}

datasets:
  nuaa_sirst:
    root_env: "NUAA_SIRST_ROOT"
    config:
      dataset_id: "NUAA-SIRST"
      adapter: "generic_image_mask"
      root: "datasets/NUAA-SIRST"
      modality: "ir"
      images_dir: "images"
      masks_dir: "masks"
      mask_mode: "binary"
      class_map: {}
  nudt_sirst:
    root_env: "NUDT_SIRST_ROOT"
    config:
      dataset_id: "NUDT-SIRST"
      adapter: "generic_image_mask"
      root: "datasets/NUDT-SIRST"
      modality: "ir"
      images_dir: "images"
      masks_dir: "masks"
      mask_mode: "binary"
      class_map: {}
  irstd_1k:
    root_env: "IRSTD_1K_ROOT"
    config:
      dataset_id: "IRSTD-1K"
      adapter: "generic_image_mask"
      root: "datasets/IRSTD-1K"
      modality: "ir"
      images_dir: "images"
      masks_dir: "masks"
      mask_mode: "binary"
      class_map: {}
  multimodal:
    root_env: "MULTIMODAL_DATASET_ROOT"
    config:
      dataset_id: "MultiModal"
      adapter: "multimodal_raw"
      root: "datasets/MultiModal"
      modality: "ir"
      images_dir: "img"
      mask_mode: "auto"
      class_map: {}
  rbgt_tiny_ir_box:
    root_env: "RBGT_TINY_ROOT"
    config:
      dataset_id: "RBGT-Tiny"
      adapter: "rbgt_tiny_ir_only"
      root: "datasets/RBGT-Tiny"
      modality: "ir"
      images_dir: "image"
      annotations_dir: "annotations_coco"
      mask_mode: "auto"
      class_map: {}

methods:
  bbox_rect:
    baseline: "bbox_rect"
    method:
      name: "bbox_rect"
      family: "bbox_oracle"
      modality: "ir"
    modules: {}
    evaluation:
      inference_mode: "box"
      prompt_policy:
        name: "gt_loose_box_rect"
        prompt_type: "box"
        prompt_source: "gt"
        prompt_budget: 1
        refresh_interval: null
        multi_mask: false
        notes: "Oracle loose-box rectangle mask baseline."
    ablation_tags: ["oracle_box"]
  sam2_box_oracle:
    baseline: "sam2_zero_shot"
    method:
      name: "sam2_box_oracle"
      family: "sam2_oracle_prompt"
      modality: "ir"
      prompt_generation_protocol: "mask_derived_adaptive_loose_box_centroid_point_v2"
      box_variant: "loose"
    modules: {}
    evaluation:
      inference_mode: "box"
      prompt_policy:
        name: "mask_derived_loose_box"
        prompt_type: "box"
        prompt_source: "gt"
        prompt_budget: 1
        refresh_interval: null
        multi_mask: false
        notes: "SAM2 with adaptive loose box deterministically derived from the ground-truth mask."
    ablation_tags: ["sam2", "oracle_box", "mask_derived_prompt", "loose_box"]
  sam2_tight_box_oracle:
    baseline: "sam2_zero_shot_tight_box"
    method:
      name: "sam2_tight_box_oracle"
      family: "sam2_oracle_prompt"
      modality: "ir"
      prompt_generation_protocol: "mask_derived_tight_box_centroid_point_v1"
      box_variant: "tight"
    modules: {}
    evaluation:
      inference_mode: "box"
      prompt_policy:
        name: "mask_derived_tight_box"
        prompt_type: "box"
        prompt_source: "gt"
        prompt_budget: 1
        refresh_interval: null
        multi_mask: false
        notes: "SAM2 with tight box deterministically derived from the ground-truth mask."
    ablation_tags: ["sam2", "oracle_box", "mask_derived_prompt", "tight_box"]
  sam2_point_oracle:
    baseline: "sam2_zero_shot_point"
    method:
      name: "sam2_point_oracle"
      family: "sam2_oracle_prompt"
      modality: "ir"
      prompt_generation_protocol: "mask_derived_centroid_point_v1"
      point_variant: "foreground_centroid"
    modules: {}
    evaluation:
      inference_mode: "point"
      prompt_policy:
        name: "mask_derived_centroid_point"
        prompt_type: "point"
        prompt_source: "gt"
        prompt_budget: 1
        refresh_interval: null
        multi_mask: false
        notes: "SAM2 with foreground-centroid point deterministically derived from the ground-truth mask."
    ablation_tags: ["sam2", "oracle_point", "mask_derived_prompt", "centroid_point"]
  sam2_box_point_oracle:
    baseline: "sam2_zero_shot_box_point"
    method:
      name: "sam2_box_point_oracle"
      family: "sam2_oracle_prompt"
      modality: "ir"
      prompt_generation_protocol: "mask_derived_adaptive_loose_box_centroid_point_v2"
      box_variant: "loose"
      point_variant: "foreground_centroid"
    modules: {}
    evaluation:
      inference_mode: "box+point"
      prompt_policy:
        name: "mask_derived_loose_box_centroid_point"
        prompt_type: "box+point"
        prompt_source: "gt"
        prompt_budget: 2
        refresh_interval: null
        multi_mask: false
        notes: "SAM2 with adaptive loose box and foreground-centroid point deterministically derived from the ground-truth mask."
    ablation_tags: ["sam2", "oracle_box_point", "mask_derived_prompt", "loose_box", "centroid_point"]
  sam2_no_prompt_auto_mask:
    baseline: "sam2_no_prompt_auto_mask"
    method:
      name: "sam2_no_prompt_auto_mask"
      family: "sam2_auto_mask"
      modality: "ir"
    modules: {}
    evaluation:
      track: "track_b_auto_mask"
      inference_mode: "no_prompt_auto_mask"
      prompt_policy:
        name: "no_prompt_auto_mask"
        prompt_type: "none"
        prompt_source: "none"
        prompt_budget: 0
        refresh_interval: null
        multi_mask: true
        notes: "SAM2 automatic mask generator without external prompts."
    ablation_tags: ["sam2", "no_prompt"]
  sam2_physics_auto_prompt:
    baseline: "sam2_physics_auto_prompt"
    method:
      name: "sam2_physics_auto_prompt"
      family: "ir_prompted_sam2"
      modality: "ir"
    modules:
      prior:
        name: "prior_fusion"
        enabled: ["local_contrast", "multi_scale_top_hat", "snr_like"]
        scales: [7, 15, 31]
        weights:
          local_contrast: 0.4
          multi_scale_top_hat: 0.4
          snr_like: 0.2
      prompt:
        name: "heuristic_physics"
        type: "box+point"
        percentile: 99.5
        top_k: 1
        min_component_area: 2
        box_pad_ratio: 0.25
      adapter:
        name: "identity"
      decoder:
        name: "sam2_mask_decoder"
      loss:
        name: "none"
      distiller:
        name: "none"
      quantizer:
        name: "none"
    evaluation:
      inference_mode: "box+point"
      prompt_policy:
        name: "physics_auto_box_point"
        prompt_type: "box+point"
        prompt_source: "synthesized"
        prompt_budget: 2
        refresh_interval: null
        multi_mask: false
        notes: "Physics-prior automatic prompt from IR image only."
    ablation_tags: ["sam2", "physics_prior", "auto_prompt"]
  physics_no_local_contrast:
    extends: "sam2_physics_auto_prompt"
    modules:
      prior:
        enabled: ["multi_scale_top_hat", "snr_like"]
    ablation_tags: ["ablation", "no_local_contrast"]
  physics_no_top_hat:
    extends: "sam2_physics_auto_prompt"
    modules:
      prior:
        enabled: ["local_contrast", "snr_like"]
    ablation_tags: ["ablation", "no_top_hat"]
  physics_no_snr:
    extends: "sam2_physics_auto_prompt"
    modules:
      prior:
        enabled: ["local_contrast", "multi_scale_top_hat"]
    ablation_tags: ["ablation", "no_snr"]
  physics_percentile_99_0:
    extends: "sam2_physics_auto_prompt"
    modules:
      prompt:
        percentile: 99.0
    ablation_tags: ["ablation", "percentile_99_0"]
  physics_percentile_99_8:
    extends: "sam2_physics_auto_prompt"
    modules:
      prompt:
        percentile: 99.8
    ablation_tags: ["ablation", "percentile_99_8"]
  physics_top_k_3:
    extends: "sam2_physics_auto_prompt"
    modules:
      prompt:
        top_k: 3
    ablation_tags: ["ablation", "top_k_3"]
  physics_pad_0_10:
    extends: "sam2_physics_auto_prompt"
    modules:
      prompt:
        box_pad_ratio: 0.10
    ablation_tags: ["ablation", "box_pad_0_10"]
  physics_pad_0_40:
    extends: "sam2_physics_auto_prompt"
    modules:
      prompt:
        box_pad_ratio: 0.40
    ablation_tags: ["ablation", "box_pad_0_40"]

groups:
  p0_baselines: ["T1_oracle_prompt_baselines"]
  p0_auto_prompt: ["T2_ir_auto_prompt"]
  p0_ablation: ["T3_prior_prompt_ablation"]
  p0_prompt_protocol: ["T6_prompt_generation_protocol_ablation"]
  p0_all: ["T1_oracle_prompt_baselines", "T2_ir_auto_prompt", "T3_prior_prompt_ablation"]

experiments:
  - experiment_id: "T1_oracle_prompt_baselines"
    status: "planned"
    datasets: ["nuaa_sirst", "nudt_sirst", "irstd_1k", "multimodal"]
    methods: ["bbox_rect", "sam2_box_oracle", "sam2_point_oracle", "sam2_box_point_oracle"]
    metrics: ["mIoU", "Dice", "BoundaryF1", "TargetRecallIoU25", "FalseAlarmPixelsPerMP", "LatencyMs"]
    purpose: "Measure oracle-prompt SAM2 upper bound and box-rectangle baseline on IR mask datasets."
  - experiment_id: "T2_ir_auto_prompt"
    status: "planned"
    datasets: ["nuaa_sirst", "nudt_sirst", "irstd_1k", "multimodal"]
    methods: ["sam2_no_prompt_auto_mask", "sam2_physics_auto_prompt"]
    metrics: ["mIoU", "Dice", "TargetRecallIoU25", "FalseAlarmPixelsPerMP", "PromptHitRate", "PromptBoxCoverage", "LatencyMs"]
    purpose: "Compare no-prompt SAM2 with IR physics-prior automatic prompting."
  - experiment_id: "T3_prior_prompt_ablation"
    status: "planned"
    datasets: ["nuaa_sirst", "nudt_sirst", "irstd_1k", "multimodal"]
    methods:
      - "sam2_physics_auto_prompt"
      - "physics_no_local_contrast"
      - "physics_no_top_hat"
      - "physics_no_snr"
      - "physics_percentile_99_0"
      - "physics_percentile_99_8"
      - "physics_top_k_3"
      - "physics_pad_0_10"
      - "physics_pad_0_40"
    metrics: ["mIoU", "Dice", "TargetRecallIoU25", "FalseAlarmPixelsPerMP", "PromptHitRate", "PromptDistanceToCentroid", "PromptBoxCoverage"]
    purpose: "Ablate physics priors and prompt post-processing knobs."
  - experiment_id: "T6_prompt_generation_protocol_ablation"
    status: "planned"
    datasets: ["nuaa_sirst", "nudt_sirst", "irstd_1k", "multimodal"]
    methods: ["sam2_box_oracle", "sam2_tight_box_oracle"]
    metrics: ["mIoU", "Dice", "BoundaryF1", "TargetRecallIoU25", "FalseAlarmPixelsPerMP", "PromptBoxCoverage", "LatencyMs"]
    purpose: "Measure whether mask-derived loose-box expansion changes the SAM2 oracle prompt conclusion relative to tight GT boxes."
  - experiment_id: "T4_trainable_adapter_placeholder"
    status: "planned_after_p0"
    datasets: ["nuaa_sirst", "nudt_sirst", "irstd_1k", "multimodal"]
    methods: ["frozen_sam2_ir_fpn", "sam2_ir_adapter_fpn", "physics_prompt_sam2_ir"]
    metrics: ["mIoU", "Dice", "TargetRecallIoU25", "FalseAlarmPixelsPerMP", "LatencyMs"]
    purpose: "Reserved trainable adapter/decoder ablations."
  - experiment_id: "T5_distill_quant_placeholder"
    status: "planned_after_training"
    datasets: ["nuaa_sirst", "nudt_sirst", "irstd_1k", "multimodal"]
    methods: ["edge_student", "edge_student_ptq", "edge_student_qat"]
    metrics: ["mIoU", "Dice", "TargetRecallIoU25", "LatencyMs", "ModelSizeMB"]
    purpose: "Reserved distillation and quantization experiments."
