[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "irsam2-benchmark"
version = "0.1.0"
description = "Paper-grade SAM2 benchmark platform for infrared transfer, adaptation, distillation, quantization, and evaluation."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.24",
  "Pillow>=10.0",
]

[project.optional-dependencies]
yaml = ["PyYAML>=6.0"]

[project.scripts]
irsam2-benchmark = "irsam2_benchmark.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
